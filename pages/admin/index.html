<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Loja Roupas</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="container">
    <h1>Admin — Conteúdo</h1>

    <section id="auth">
      <div id="auth-area">
        <input id="email" type="email" placeholder="Email para login (magic link)" />
        <button id="btn-signin">Enviar link</button>
        <button id="btn-signout" hidden>Sair</button>
      </div>
      <div id="user-info" hidden></div>
    </section>

    <section id="editor" hidden>
      <h2>Novo produto / editar</h2>
      <form id="product-form">
        <input id="prod-id" type="hidden">
        <input id="nome" placeholder="Nome" required>
        <input id="preco" placeholder="Preço" type="number" step="0.01">
        <textarea id="descricao" placeholder="Descrição (curta)"></textarea>
        <input id="imagem" type="file" accept="image/*" multiple>
        <div id="preview-gallery" class="preview-gallery"></div>
        <div class="actions">
          <button type="submit">Salvar</button>
          <button id="btn-cancel" type="button">Cancelar</button>
        </div>
      </form>
    </section>

    <section id="id-guide" hidden>
      <h2>Referência de IDs e cores</h2>
      <p class="muted">Use esta tabela para manter cadastro organizado por peça e cor.</p>
      <p class="muted"><strong>Próximo ID sugerido:</strong> <span id="next-product-id">-</span></p>
      <div class="id-guide-table-wrap">
        <table class="id-guide-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Produto</th>
              <th>Cor</th>
            </tr>
          </thead>
          <tbody id="id-guide-body"></tbody>
        </table>
      </div>
    </section>

    <section id="list">
      <h2>Produtos</h2>
      <div class="actions" style="margin-bottom: 10px;">
        <button id="btn-remove-franja" type="button">Remover Camisa franja (teste)</button>
      </div>
      <div id="products"></div>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
